<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Birthday Surprise</title>

    <!-- FONT AWESOME -->

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <!-- Typed JS -->
    <script src="https://cdn.jsdelivr.net/npm/typed.js@2.0.12"></script>

    <!-- Confetti -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            overflow-x: hidden;
            background: linear-gradient(135deg,
                    #ff0080,
                    #7928ca,
                    #00c6ff);
            min-height: 100vh;
            color: white;
            position: relative;
        }

        /* ========================= */
        /* START SCREEN */
        /* ========================= */

        .start-screen {
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .start-box {
            width: 100%;
            max-width: 700px;
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(12px);
            border-radius: 30px;
            padding: 50px;
            text-align: center;
            box-shadow: 0 0 40px rgba(255, 255, 255, 0.3);
            animation: zoomIn 1s ease;
        }

        @keyframes zoomIn {
            from {
                transform: scale(0.5);
                opacity: 0;
            }

            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .emoji {
            font-size: 80px;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-15px);
            }
        }

        h1 {
            font-size: 55px;
            margin-top: 20px;
            font-weight: bold;
            text-shadow: 0 0 20px white;
        }

        h2 {
            margin-top: 15px;
            font-size: 28px;
        }

        .btn-custom {
            border: none;
            padding: 15px 45px;
            margin: 20px 10px;
            border-radius: 50px;
            font-size: 22px;
            font-weight: bold;
            transition: 0.4s;
        }

        .yes-btn {
            background: #00ff88;
            color: black;
        }

        .yes-btn:hover {
            transform: scale(1.1);
        }

        .no-btn {
            background: #ff004c;
            color: white;
            position: relative;
        }

        /* ========================= */
        /* BIRTHDAY SCREEN */
        /* ========================= */

        .birthday-screen {
            display: none;
            padding: 40px 20px;
            min-height: 100vh;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .birthday-title {
            font-size: 70px;
            font-weight: bold;
            text-shadow: 0 0 25px white;
            animation: glow 2s infinite alternate;
        }

        @keyframes glow {
            from {
                text-shadow: 0 0 15px white;
            }

            to {
                text-shadow: 0 0 40px yellow;
            }
        }

        .typing {
            margin-top: 20px;
            font-size: 32px;
            font-weight: bold;
            color: yellow;
            min-height: 70px;
        }

        /* ========================= */
        /* AGE BOX */
        /* ========================= */

        .info-box {
            margin-top: 30px;
        }

        .info-box h3 {
            margin: 12px 0;
            font-size: 28px;
        }

        /* ========================= */
        /* CENTER IMAGE */
        /* ========================= */

        .center-img {
            width: 260px;
            height: 260px;
            border-radius: 50%;
            object-fit: cover;
            border: 6px solid white;
            margin-top: 30px;
            box-shadow: 0 0 35px white;
            animation: centerMove 3s infinite ease-in-out;
        }

        @keyframes centerMove {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.08);
            }
        }

        /* ========================= */
        /* IMAGE SLIDERS */
        /* ========================= */

        .slider-container {
            width: 100%;
            overflow: hidden;
            margin-top: 50px;
        }

        .slider {
            display: flex;
            width: max-content;
            gap: 20px;
        }

        .slider img {
            width: 220px;
            height: 280px;
            object-fit: cover;
            border-radius: 25px;
            border: 4px solid white;
            box-shadow: 0 0 20px white;
        }

        .left-slide {
            animation: leftSlide 18s linear infinite;
        }

        .right-slide {
            animation: rightSlide 18s linear infinite;
        }

        @keyframes leftSlide {
            from {
                transform: translateX(0);
            }

            to {
                transform: translateX(-50%);
            }
        }

        @keyframes rightSlide {
            from {
                transform: translateX(-50%);
            }

            to {
                transform: translateX(0);
            }
        }

        /* ========================= */
        /* LOVE SECTION */
        /* ========================= */

        .love-section {
            margin-top: 80px;
        }

        .love-section h2 {
            font-size: 45px;
            margin-bottom: 25px;
        }

        .love-btn {
            border: none;
            padding: 14px 40px;
            border-radius: 50px;
            margin: 10px;
            font-size: 22px;
            font-weight: bold;
        }

        .love-yes {
            background: #00ff88;
            color: black;
        }

        .love-no {
            background: red;
            color: white;
            position: relative;
        }

        /* ========================= */
        /* HEART */
        /* ========================= */

        .heart {
            position: fixed;
            bottom: -20px;
            color: #ff006a;
            animation: floatHeart linear infinite;
            z-index: 999;
        }

        @keyframes floatHeart {
            0% {
                transform: translateY(0) scale(1);
                opacity: 1;
            }

            100% {
                transform: translateY(-120vh) scale(1.5);
                opacity: 0;
            }
        }

        /* ========================= */
        /* FLOWERS */
        /* ========================= */

        .flower {
            position: fixed;
            top: -20px;
            animation: flowerFall linear infinite;
            z-index: 999;
        }

        @keyframes flowerFall {
            0% {
                transform: translateY(-10vh) rotate(0deg);
            }

            100% {
                transform: translateY(120vh) rotate(360deg);
            }
        }

        /* ========================= */
        /* MUSIC BUTTON */
        /* ========================= */

        .music-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: none;
            background: white;
            color: #ff0080;
            font-size: 24px;
            z-index: 1000;
        }

        /* ========================= */
        /* RESPONSIVE */
        /* ========================= */

        @media(max-width:768px) {

            h1,
            .birthday-title {
                font-size: 36px;
            }

            h2 {
                font-size: 22px;
            }

            .typing {
                font-size: 22px;
            }

            .slider img {
                width: 140px;
                height: 190px;
            }

            .center-img {
                width: 180px;
                height: 180px;
            }

            .love-section h2 {
                font-size: 30px;
            }
        }


        /* LOVE SECTION */

        .love-section {
            margin-top: 80px;
            text-align: center;
        }

        .love-section h2 {
            font-size: 45px;
            margin-bottom: 30px;
            color: white;
            text-shadow: 0 0 15px white;
        }

        /* BUTTON COMMON */

        .love-btn {
            display: inline-block;
            padding: 15px 40px;
            margin: 10px;
            border-radius: 50px;
            font-size: 22px;
            font-weight: bold;
            text-decoration: none;
            border: none;
            cursor: pointer;
            transition: 0.4s;
        }

        /* YES BUTTON */

        .love-yes {
            background: linear-gradient(45deg, #00ff88, #00ccff);
            color: black;
            box-shadow: 0 0 20px #00ff88;
        }

        .love-yes:hover {
            transform: scale(1.1);
            color: black;
        }

        /* NO BUTTON */

        .love-no {
            background: linear-gradient(45deg, #ff004c, #ff6600);
            color: white;
            position: relative;
            box-shadow: 0 0 20px #ff004c;
        }

        .love-no:hover {
            transform: scale(1.1);
        }

        /* MOBILE RESPONSIVE */

        @media(max-width:768px) {

            .love-section h2 {
                font-size: 28px;
            }

            .love-btn {
                font-size: 18px;
                padding: 12px 28px;
            }

        }



        /* MUSIC BUTTON */

        .music-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 65px;
            height: 65px;
            border: none;
            border-radius: 50%;
            background: linear-gradient(45deg, #ff0080, #7928ca);
            color: white;
            font-size: 24px;
            cursor: pointer;
            z-index: 9999;
            box-shadow: 0 0 20px white;
            transition: 0.4s;
            animation: musicGlow 2s infinite alternate;
        }

        .music-btn:hover {
            transform: scale(1.1) rotate(10deg);
        }

        @keyframes musicGlow {

            from {
                box-shadow: 0 0 15px white;
            }

            to {
                box-shadow: 0 0 35px #ff00ff;
            }

        }
    </style>

</head>

<body>

    <!-- MUSIC -->
    <audio id="music" autoplay loop>
        <source src="hbdy.mp3" type="audio/mp3">
    </audio>

    <!-- MUSIC BUTTON -->
    <button class="music-btn" onclick="toggleMusic()">
        <i class="fa-solid fa-music"></i>
    </button>

    <!-- MUSIC BUTTON -->
    <button class="music-btn" onclick="toggleMusic()">
        <i class="fa-solid fa-music"></i>
    </button>

    <!-- ========================= -->
    <!-- START SCREEN -->
    <!-- ========================= -->

    <div class="start-screen" id="startScreen">

        <div class="start-box">

            <div class="emoji">🎂💖🥳</div>

            <h1>Today Is Your Birthday Dear ?</h1>

            <h2>Open Your Special Surprise 🎁</h2>

            <button class="btn-custom yes-btn" onclick="openBirthday()">
                YES 💖
            </button>

            <button class="btn-custom no-btn" id="noBtn">
                NO 😒
            </button>

        </div>

    </div>

    <!-- ========================= -->
    <!-- BIRTHDAY SCREEN -->
    <!-- ========================= -->

    <div class="birthday-screen" id="birthdayScreen">

        <div class="emoji">🎉🎂🎈</div>

        <h1 class="birthday-title">
            Happy Birthday Shaji 💖
        </h1>

        <div class="typing">
            <span id="typed"></span>
        </div>

        <!-- NAME + DOB + AGE -->

        <div class="info-box">

            <h3>Name : Shaji 💕</h3>

            <h3>Date Of Birth : 26 May 1989 🎂</h3>

            <h3 id="age">
                Age : 0
            </h3>

        </div>

        <!-- CENTER IMAGE -->

        <img src="img/aa5.jpeg" class="center-img">

        <!-- LEFT TO RIGHT -->

        <div class="slider-container">

            <div class="slider left-slide">

                <img src="img/aa1.jpeg">
                <img src="img/aa2.jpeg">
                <img src="img/aa3.jpeg">
                <img src="img/aa4.jpeg">
                <img src="img/aa5.jpeg">
                <img src="img/aa6.jpeg">
                <img src="img/aa7.jpeg">
                <img src="img/aa8.jpeg">
                <img src="img/aa9.jpeg">
                <img src="img/aa10.jpeg">

            </div>

        </div>

        <!-- RIGHT TO LEFT -->

        <div class="slider-container">

            <div class="slider right-slide">

                <img src="img/aa10.jpeg">
                <img src="img/aa9.jpeg">
                <img src="img/aa8.jpeg">
                <img src="img/aa7.jpeg">
                <img src="img/aa6.jpeg">
                <img src="img/aa5.jpeg">
                <img src="img/aa4.jpeg">
                <img src="img/aa3.jpeg">
                <img src="img/aa2.jpeg">
                <img src="img/aa1.jpeg">

            </div>

        </div>

        <!-- LOVE SECTION -->

        <div class="love-section">

            <h2>Do You Like Me ? 💖</h2>

            <!-- YES BUTTON -->
            <a href="Happy Birthday.html" class="love-btn love-yes">
                YES 😍
            </a>

            <!-- NO BUTTON -->
            <button class="love-btn love-no" id="loveNo">
                NO 🙈
            </button>

        </div>

    </div>

    <!-- ========================= -->
    <!-- SCRIPT -->
    <!-- ========================= -->

    <script>

        // =====================
        // AGE CALCULATE
        // =====================

        const dob = new Date("1989-05-26");

        const today = new Date();

        let age =
            today.getFullYear() -
            dob.getFullYear();

        const month =
            today.getMonth() -
            dob.getMonth();

        if (
            month < 0 ||
            (month === 0 &&
                today.getDate() < dob.getDate())
        ) {
            age--;
        }

        document.getElementById("age").innerHTML =
            "Age : " + age + " Years 🎂";

        // =====================
        // START BUTTON
        // =====================

        function openBirthday() {

            document.getElementById("startScreen")
                .style.display = "none";

            document.getElementById("birthdayScreen")
                .style.display = "block";

            // Music Start

            document.getElementById("music")
                .play();

            // Typed JS

            new Typed('#typed', {

                strings: [

                    'Have A Beautiful Day 💖',

                    'Stay Happy Forever ✨',

                    'You Are So Special 🥰',

                    'May All Dreams Come True 🎂'

                ],

                typeSpeed: 60,

                backSpeed: 30,

                loop: true

            });

            // Confetti

            startConfetti();

        }

        // =====================
        // CONFETTI
        // =====================

        function startConfetti() {

            setInterval(() => {

                confetti({

                    particleCount: 120,

                    spread: 120,

                    origin: {
                        y: 0.6
                    }

                });

            }, 2500);

        }

        // =====================
        // NO BUTTON MOVE
        // =====================

        const noBtn =
            document.getElementById("noBtn");

        noBtn.addEventListener("mouseover",
            () => {

                const x =
                    Math.random() * 500 - 250;

                const y =
                    Math.random() * 500 - 250;

                noBtn.style.transform =
                    `translate(${x}px, ${y}px)`;

            });

        // =====================
        // LOVE NO BUTTON MOVE
        // =====================

        const loveNo =
            document.getElementById("loveNo");

        loveNo.addEventListener("mouseover",
            () => {

                const x =
                    Math.random() * 400 - 200;

                const y =
                    Math.random() * 400 - 200;

                loveNo.style.transform =
                    `translate(${x}px, ${y}px)`;

            });

        // =====================
        // HEARTS
        // =====================

        function createHeart() {

            const heart =
                document.createElement("div");

            heart.classList.add("heart");

            heart.innerHTML = "💖";

            heart.style.left =
                Math.random() * 100 + "vw";

            heart.style.fontSize =
                Math.random() * 20 + 20 + "px";

            heart.style.animationDuration =
                Math.random() * 3 + 3 + "s";

            document.body.appendChild(heart);

            setTimeout(() => {

                heart.remove();

            }, 6000);

        }

        setInterval(createHeart, 300);

        // =====================
        // FLOWERS
        // =====================

        function createFlower() {

            const flower =
                document.createElement("div");

            flower.classList.add("flower");

            flower.innerHTML = "🌸";

            flower.style.left =
                Math.random() * 100 + "vw";

            flower.style.fontSize =
                Math.random() * 20 + 20 + "px";

            flower.style.animationDuration =
                Math.random() * 5 + 5 + "s";

            document.body.appendChild(flower);

            setTimeout(() => {

                flower.remove();

            }, 10000);

        }

        setInterval(createFlower, 500);

        // =====================
        // MUSIC
        // =====================

        function toggleMusic() {

            const music =
                document.getElementById("music");

            if (music.paused) {

                music.play();

            } else {

                music.pause();

            }

        }


        // =====================
        // MUSIC PLAY / PAUSE
        // =====================

        const music =
            document.getElementById("music");

        window.onload = () => {

            // AUTO PLAY

            music.play().catch(() => {

                console.log(
                    "Autoplay blocked by browser"
                );

            });

        };

        function toggleMusic() {

            if (music.paused) {

                music.play();

            } else {

                music.pause();

            }

        }

    </script>

</body>

</html>
