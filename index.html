<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Birthday Surprise</title>

    <!-- Bootstrap -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <!-- Typed JS -->

    <script src="https://cdn.jsdelivr.net/npm/typed.js@2.0.12"></script>

    <!-- Confetti -->

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <!-- Google Font -->

    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;700;800&display=swap"
        rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            overflow-x: hidden;
            background: linear-gradient(135deg,
                    #ff0080,
                    #7928ca,
                    #00c6ff);

            background-size: 400% 400%;

            animation: bgMove 12s ease infinite;

            min-height: 100vh;

            color: white;

            position: relative;
        }

        @keyframes bgMove {

            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }

        }

        /* ========================= */

        .music-btn {

            position: fixed;

            top: 20px;

            right: 20px;

            width: 65px;

            height: 65px;

            border-radius: 50%;

            border: none;

            background: linear-gradient(45deg,
                    #ff0080,
                    #7928ca);

            color: white;

            font-size: 24px;

            z-index: 99999;

            cursor: pointer;

            box-shadow: 0 0 25px white;

            animation: musicGlow 2s infinite alternate;
        }

        @keyframes musicGlow {

            from {
                box-shadow: 0 0 10px white;
            }

            to {
                box-shadow: 0 0 35px #ff00ff;
            }

        }

        /* ========================= */

        .start-screen {

            width: 100%;

            min-height: 100vh;

            display: flex;

            justify-content: center;

            align-items: center;

            padding: 20px;
        }

        .start-box {

            width: 100%;

            max-width: 700px;

            background: rgba(255, 255, 255, 0.12);

            backdrop-filter: blur(15px);

            border-radius: 30px;

            padding: 50px;

            text-align: center;

            box-shadow: 0 0 35px rgba(255, 255, 255, 0.3);

            animation: zoomIn 1s ease;
        }

        @keyframes zoomIn {

            from {

                transform: scale(.5);

                opacity: 0;

            }

            to {

                transform: scale(1);

                opacity: 1;

            }

        }

        .emoji {

            font-size: 90px;

            animation: bounce 2s infinite;
        }

        @keyframes bounce {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-20px);
            }

        }

        h1 {

            font-size: 55px;

            margin-top: 20px;

            font-weight: 800;

            text-shadow: 0 0 20px white;
        }

        h2 {

            margin-top: 15px;

            font-size: 28px;
        }

        .btn-custom {

            border: none;

            padding: 15px 45px;

            border-radius: 50px;

            margin: 15px;

            font-size: 22px;

            font-weight: bold;

            transition: .4s;
        }

        .yes-btn {

            background: linear-gradient(45deg,
                    #00ff88,
                    #00ccff);

            color: black;

            box-shadow: 0 0 25px #00ff88;
        }

        .yes-btn:hover {

            transform: scale(1.1);

        }

        .no-btn {

            background: linear-gradient(45deg,
                    #ff004c,
                    #ff6600);

            color: white;

            position: relative;

            box-shadow: 0 0 25px #ff004c;
        }

        /* ========================= */

        .gift-screen {

            display: none;

            min-height: 100vh;

            justify-content: center;

            align-items: center;

            flex-direction: column;

            text-align: center;

            padding: 20px;
        }

        .gift-box {

            font-size: 220px;

            cursor: pointer;

            animation: giftMove 2s infinite;
        }

        @keyframes giftMove {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.1);
            }

        }

        .gift-text {

            font-size: 55px;

            font-weight: bold;

            margin-bottom: 20px;

            text-shadow: 0 0 25px white;
        }

        /* ========================= */

        .birthday-screen {

            display: none;

            padding: 30px 20px;

            min-height: 100vh;

            text-align: center;

            position: relative;

            overflow: hidden;
        }

        .birthday-title {

            font-size: 70px;

            font-weight: 800;

            text-shadow: 0 0 30px white;

            animation: glow 2s infinite alternate;
        }

        @keyframes glow {

            from {
                text-shadow: 0 0 10px white;
            }

            to {
                text-shadow: 0 0 35px yellow;
            }

        }

        .typing {

            margin-top: 20px;

            min-height: 70px;

            font-size: 30px;

            color: yellow;

            font-weight: bold;
        }

        .info-box {

            margin-top: 30px;
        }

        .info-box h3 {

            margin: 10px 0;

            font-size: 28px;
        }

        /* ========================= */

        .center-box {

            position: relative;

            width: 280px;

            margin: 40px auto;
        }

        .center-img {

            width: 280px;

            height: 280px;

            border-radius: 50%;

            object-fit: cover;

            border: 8px solid white;

            box-shadow: 0 0 35px white;

            animation: pulse 3s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.07);
            }

        }

        .heart-ring {

            position: absolute;

            top: -20px;

            left: -20px;

            width: 320px;

            height: 320px;

            border-radius: 50%;

            border: 4px dashed pink;

            animation: rotateHeart 10s linear infinite;
        }

        @keyframes rotateHeart {

            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }

        }

        /* ========================= */

        .slider-container {

            width: 100%;

            overflow: hidden;

            margin-top: 40px;
        }

        .slider {

            display: flex;

            width: max-content;

            gap: 20px;
        }

        .slider img {

            width: 220px;

            height: 280px;

            object-fit: cover;

            border-radius: 25px;

            border: 4px solid white;

            box-shadow: 0 0 25px white;
        }

        .left-slide {

            animation: leftSlide 18s linear infinite;
        }

        .right-slide {

            animation: rightSlide 18s linear infinite;
        }

        @keyframes leftSlide {

            from {
                transform: translateX(0);
            }

            to {
                transform: translateX(-50%);
            }

        }

        @keyframes rightSlide {

            from {
                transform: translateX(-50%);
            }

            to {
                transform: translateX(0);
            }

        }

        /* ========================= */

        .heart {

            position: fixed;

            bottom: -20px;

            color: #ff006a;

            z-index: 999;

            animation: floatHeart linear infinite;
        }

        @keyframes floatHeart {

            0% {

                transform: translateY(0) scale(1);

                opacity: 1;

            }

            100% {

                transform: translateY(-120vh) scale(1.5);

                opacity: 0;

            }

        }

        .flower {

            position: fixed;

            top: -20px;

            z-index: 999;

            animation: flowerFall linear infinite;
        }

        @keyframes flowerFall {

            0% {
                transform: translateY(-10vh) rotate(0deg);
            }

            100% {
                transform: translateY(120vh) rotate(360deg);
            }

        }

        /* ========================= */

        .love-section {

            margin-top: 80px;
        }

        .love-section h2 {

            font-size: 45px;

            margin-bottom: 25px;

            text-shadow: 0 0 20px white;
        }

        .love-btn {

            border: none;

            padding: 15px 40px;

            border-radius: 50px;

            margin: 10px;

            font-size: 22px;

            font-weight: bold;

            transition: .4s;

            text-decoration: none;

            display: inline-block;
        }

        .love-yes {

            background: linear-gradient(45deg,
                    #00ff88,
                    #00ccff);

            color: black;

            box-shadow: 0 0 25px #00ff88;
        }

        .love-no {

            background: linear-gradient(45deg,
                    #ff004c,
                    #ff6600);

            color: white;

            position: relative;

            box-shadow: 0 0 25px #ff004c;
        }

        /* ========================= */

        @media(max-width:768px) {

            h1,
            .birthday-title,
            .gift-text {

                font-size: 35px;
            }

            h2 {

                font-size: 20px;
            }

            .typing {

                font-size: 22px;
            }

            .center-img {

                width: 190px;

                height: 190px;
            }

            .heart-ring {

                width: 220px;

                height: 220px;

                left: -15px;
            }

            .slider img {

                width: 140px;

                height: 190px;
            }

            .gift-box {

                font-size: 140px;
            }

            .love-section h2 {

                font-size: 28px;
            }

            .love-btn {

                font-size: 18px;

                padding: 12px 25px;
            }

        }
    </style>

</head>

<body>

    <!-- MUSIC -->

    <audio id="music" autoplay loop>
        <source src="hbdy.mp3" type="audio/mp3">
    </audio>

    <!-- MUSIC BUTTON -->

    <button class="music-btn" onclick="toggleMusic()">
        <i class="fa-solid fa-music"></i>
    </button>

    <!-- ====================== -->
    <!-- START SCREEN -->
    <!-- ====================== -->

    <div class="start-screen" id="startScreen">

        <div class="start-box">

            <div class="emoji">🎂💖🥳</div>

            <h1>Today Is Your Birthday Dear ?</h1>

            <h2>Click YES To Continue 🎁</h2>

            <button class="btn-custom yes-btn" onclick="openGift()">
                YES 💖
            </button>

            <button class="btn-custom no-btn" id="noBtn">
                NO 😒
            </button>

        </div>

    </div>

    <!-- ====================== -->
    <!-- GIFT SCREEN -->
    <!-- ====================== -->

    <div class="gift-screen" id="giftScreen">

        <h1 class="gift-text">
            OH REALLY 😍
            <br>
            Today Is Your Birthday 🎂
            <br>
            Open Your Gift 🎁
        </h1>

        <div class="gift-box" onclick="openBirthday()">
            🎁
        </div>

        <h2>Click Gift Box 💖</h2>

    </div>

    <!-- ====================== -->
    <!-- BIRTHDAY SCREEN -->
    <!-- ====================== -->

    <div class="birthday-screen" id="birthdayScreen">

        <div class="emoji">🎉🎂🎈</div>

        <h1 class="birthday-title">
            Happy Birthday Shaji 💖
        </h1>

        <div class="typing">
            <span id="typed"></span>
        </div>

        <!-- INFO -->

        <div class="info-box">

            <h3>Name : Shaji 💕</h3>

            <h3>Date Of Birth : 26 May 1989 🎂</h3>

            <h3 id="age">
                Age : 0
            </h3>

        </div>

        <!-- CENTER IMAGE -->

        <div class="center-box">

            <div class="heart-ring"></div>

            <img src="img/aa5.jpeg" class="center-img">

        </div>

        <!-- SLIDER 1 -->

        <div class="slider-container">

            <div class="slider left-slide">

                <img src="img/aa1.jpeg">
                <img src="img/aa2.jpeg">
                <img src="img/aa3.jpeg">
                <img src="img/aa4.jpeg">
                <img src="img/aa5.jpeg">
                <img src="img/aa6.jpeg">
                <img src="img/aa7.jpeg">
                <img src="img/aa8.jpeg">
                <img src="img/aa9.jpeg">
                <img src="img/aa10.jpeg">

            </div>

        </div>

        <!-- SLIDER 2 -->

        <div class="slider-container">

            <div class="slider right-slide">

                <img src="img/aa10.jpeg">
                <img src="img/aa9.jpeg">
                <img src="img/aa8.jpeg">
                <img src="img/aa7.jpeg">
                <img src="img/aa6.jpeg">
                <img src="img/aa5.jpeg">
                <img src="img/aa4.jpeg">
                <img src="img/aa3.jpeg">
                <img src="img/aa2.jpeg">
                <img src="img/aa1.jpeg">

            </div>

        </div>

        <!-- LOVE SECTION -->

        <div class="love-section">

            <h2>Do You Like Me ? 💖</h2>

            <a href="Happy Birthday.html" class="love-btn love-yes">
                YES 😍
            </a>

            <button class="love-btn love-no" id="loveNo">
                NO 🙈
            </button>

        </div>

    </div>

    <!-- ====================== -->
    <!-- JAVASCRIPT -->
    <!-- ====================== -->

    <script>

        // ======================
        // AGE CALCULATE
        // ======================

        const dob = new Date("1989-05-26");

        const today = new Date();

        let age =
            today.getFullYear() -
            dob.getFullYear();

        const month =
            today.getMonth() -
            dob.getMonth();

        if (
            month < 0 ||
            (
                month === 0 &&
                today.getDate() < dob.getDate()
            )
        ) {
            age--;
        }

        document.getElementById("age")
            .innerHTML =
            "Age : " + age + " Years 🎂";

        // ======================
        // OPEN GIFT
        // ======================

        function openGift() {

            document.getElementById("startScreen")
                .style.display = "none";

            document.getElementById("giftScreen")
                .style.display = "flex";

        }

        // ======================
        // OPEN BIRTHDAY
        // ======================

        function openBirthday() {

            document.getElementById("giftScreen")
                .style.display = "none";

            document.getElementById("birthdayScreen")
                .style.display = "block";

            // MUSIC

            document.getElementById("music")
                .play();

            // TYPED TEXT

            new Typed('#typed', {

                strings: [

                    'Have A Beautiful Day 💖',

                    'Stay Happy Forever ✨',

                    'You Are Very Special 🥰',

                    'God Bless You Always 🙏',

                    'May All Dreams Come True 🎂'

                ],

                typeSpeed: 60,

                backSpeed: 30,

                loop: true

            });

            // CONFETTI

            startConfetti();

        }

        // ======================
        // CONFETTI
        // ======================

        function startConfetti() {

            setInterval(() => {

                confetti({

                    particleCount: 120,

                    spread: 120,

                    origin: {
                        y: 0.6
                    }

                });

            }, 2500);

        }

        // ======================
        // NO BUTTON MOVE
        // ======================

        const noBtn =
            document.getElementById("noBtn");

        noBtn.addEventListener(
            "mouseover",
            () => {

                const x =
                    Math.random() * 500 - 250;

                const y =
                    Math.random() * 500 - 250;

                noBtn.style.transform =
                    `translate(${x}px, ${y}px)`;

            }
        );

        // ======================
        // LOVE NO BUTTON MOVE
        // ======================

        const loveNo =
            document.getElementById("loveNo");

        loveNo.addEventListener(
            "mouseover",
            () => {

                const x =
                    Math.random() * 400 - 200;

                const y =
                    Math.random() * 400 - 200;

                loveNo.style.transform =
                    `translate(${x}px, ${y}px)`;

            }
        );

        // ======================
        // HEARTS
        // ======================

        function createHeart() {

            const heart =
                document.createElement("div");

            heart.classList.add("heart");

            heart.innerHTML = "💖";

            heart.style.left =
                Math.random() * 100 + "vw";

            heart.style.fontSize =
                Math.random() * 20 + 20 + "px";

            heart.style.animationDuration =
                Math.random() * 3 + 3 + "s";

            document.body.appendChild(heart);

            setTimeout(() => {

                heart.remove();

            }, 6000);

        }

        setInterval(createHeart, 300);

        // ======================
        // FLOWERS
        // ======================

        function createFlower() {

            const flower =
                document.createElement("div");

            flower.classList.add("flower");

            flower.innerHTML = "🌸";

            flower.style.left =
                Math.random() * 100 + "vw";

            flower.style.fontSize =
                Math.random() * 20 + 20 + "px";

            flower.style.animationDuration =
                Math.random() * 5 + 5 + "s";

            document.body.appendChild(flower);

            setTimeout(() => {

                flower.remove();

            }, 10000);

        }

        setInterval(createFlower, 500);

        // ======================
        // MUSIC
        // ======================

        const music =
            document.getElementById("music");

        window.onload = () => {

            music.play().catch(() => {

                console.log(
                    "Autoplay Blocked"
                );

            });

        };

        function toggleMusic() {

            if (music.paused) {

                music.play();

            } else {

                music.pause();

            }

        }

    </script>

</body>

</html>
